services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save "" --appendonly no

  app1:
    build: .
    environment:
      - REDIS_HOST=redis
      - INSTANCE_ID=app-1
      - QUEUE_BATCH_SIZE=100
      - QUEUE_SCHEDULE_RATE=1000
    depends_on:
      - redis

  app2:
    build: .
    environment:
      - REDIS_HOST=redis
      - INSTANCE_ID=app-2
      - QUEUE_BATCH_SIZE=100
      - QUEUE_SCHEDULE_RATE=1000
    depends_on:
      - redis

  app3:
    build: .
    environment:
      - REDIS_HOST=redis
      - INSTANCE_ID=app-3
      - QUEUE_BATCH_SIZE=100
      - QUEUE_SCHEDULE_RATE=1000
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app1
      - app2
      - app3
