<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueGate - 티켓 예매</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>QueueGate</h1>
        <p class="subtitle">콘서트 티켓 예매 시스템</p>
        <div class="event-info">
            <h2>2026 Spring Concert</h2>
            <p>2026.03.15 (일) 18:00</p>
            <p>서울 올림픽공원 체조경기장</p>
        </div>
        <button id="enterBtn" class="btn-primary" onclick="enterQueue()">
            예매하기
        </button>
    </div>
    <script>
        async function enterQueue() {
            const btn = document.getElementById('enterBtn');
            btn.disabled = true;
            btn.textContent = '접속 중...';

            try {
                const res = await fetch('/api/queue/enter', { method: 'POST' });
                const data = await res.json();
                window.location.href = '/waiting?token=' + data.token;
            } catch (e) {
                btn.disabled = false;
                btn.textContent = '예매하기';
                alert('서버 연결에 실패했습니다. 다시 시도해 주세요.');
            }
        }
    </script>
</body>
</html>
